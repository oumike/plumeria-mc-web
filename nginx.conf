server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip static assets
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript
                       application/wasm image/svg+xml;
    gzip_min_length    1024;

    # Resolver for proxy_pass to upstream hosts
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
    resolver_timeout 5s;

    # Long-cache hashed assets (Vite adds content hashes)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg {
        add_header Cache-Control "public, max-age=86400";
    }

    # Firmware proxy: GitHub release CDN doesn't send CORS headers, so we
    # fetch server-side and re-emit with permissive CORS so esp-web-tools
    # can download the .bin via fetch() from the browser.
    location ~ ^/firmware/(?<release_path>.+)$ {
        proxy_set_header Host github.com;
        proxy_ssl_server_name on;
        proxy_pass https://github.com/oumike/plumeria-mc/releases/download/$release_path;

        proxy_intercept_errors off;
        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;

        # Follow GitHub's 302 to release-assets.githubusercontent.com via a
        # named location so the redirect doesn't reach the browser.
        proxy_pass_request_headers on;
        error_page 301 302 = @firmware_redirect;

        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*" always;
    }

    location @firmware_redirect {
        set $redirect_url $upstream_http_location;
        proxy_set_header Host release-assets.githubusercontent.com;
        proxy_ssl_server_name on;
        proxy_pass $redirect_url;

        proxy_buffering off;
        proxy_http_version 1.1;

        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # SPA fallback: any non-file route falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
