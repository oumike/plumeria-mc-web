<svg xmlns="http://www.w3.org/2000/svg" viewBox="-44 -44 88 88">
  <!-- Card: deep violet gradient, mirroring the firmware splash background. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="-44" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c1b47"/>
      <stop offset="1" stop-color="#6b2e5c"/>
    </linearGradient>
  </defs>
  <rect x="-44" y="-44" width="88" height="88" rx="14" fill="url(#bg)"/>
  <rect x="-36" y="-36" width="72" height="72" rx="10" fill="#1a0f2b" opacity="0.7"/>

  <!-- Plumeria: 5 broad cream petals offset around center (drawPlumeriaFlower).
       Petal angles start at -90deg, stepping 72deg. -->
  <g>
    <!-- petals (creamy white) at offset r=26, petal radius ~17 -->
    <circle cx="0"   cy="-26" r="17" fill="#fff5e6"/>
    <circle cx="24.7" cy="-8" r="17" fill="#fff5e6"/>
    <circle cx="15.3" cy="21" r="17" fill="#fff5e6"/>
    <circle cx="-15.3" cy="21" r="17" fill="#fff5e6"/>
    <circle cx="-24.7" cy="-8" r="17" fill="#fff5e6"/>

    <!-- warm cream shade rings, offset r=20, opacity 0.6 -->
    <circle cx="0"   cy="-20" r="9" fill="#f6d9b8" opacity="0.6"/>
    <circle cx="19"  cy="-6"  r="9" fill="#f6d9b8" opacity="0.6"/>
    <circle cx="11.8" cy="16" r="9" fill="#f6d9b8" opacity="0.6"/>
    <circle cx="-11.8" cy="16" r="9" fill="#f6d9b8" opacity="0.6"/>
    <circle cx="-19" cy="-6"  r="9" fill="#f6d9b8" opacity="0.6"/>

    <!-- soft pink accents between petals (angle + 36deg), offset r=11, opacity 0.5 -->
    <circle cx="10.6" cy="-3.5" r="5" fill="#f7b7c9" opacity="0.5"/>
    <circle cx="0"    cy="11"    r="5" fill="#f7b7c9" opacity="0.5"/>
    <circle cx="-10.6" cy="-3.5" r="5" fill="#f7b7c9" opacity="0.5"/>
    <circle cx="6.5"  cy="-9"   r="5" fill="#f7b7c9" opacity="0.5"/>
    <circle cx="-6.5" cy="-9"   r="5" fill="#f7b7c9" opacity="0.5"/>

    <!-- amber rim behind the yellow disc -->
    <circle cx="0" cy="0" r="15" fill="#e38b2e"/>
    <!-- yellow center disc -->
    <circle cx="0" cy="0" r="13" fill="#ffc845"/>
  </g>
</svg>
